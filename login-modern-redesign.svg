<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes modernos -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    
    <linearGradient id="buttonPrimary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="titleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Filtros -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadowSoft">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo con gradiente dinámico -->
  <rect width="1920" height="1080" fill="url(#bgMain)"/>
  
  <!-- Elementos decorativos de fondo -->
  <!-- Círculos glow grandes -->
  <circle cx="300" cy="200" r="250" fill="url(#accentGlow)" opacity="0.2" filter="url(#blur)"/>
  <circle cx="1650" cy="880" r="280" fill="url(#accentGlow)" opacity="0.15" filter="url(#blur)"/>
  
  <!-- Grid sutil -->
  <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.08"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#gridPattern)"/>
  
  <!-- Líneas decorativas -->
  <line x1="0" y1="400" x2="600" y2="400" stroke="#06b6d4" stroke-width="2" opacity="0.15"/>
  <line x1="1300" y1="700" x2="1920" y2="700" stroke="#3b82f6" stroke-width="2" opacity="0.12"/>
  
  <!-- Panel izquierdo decorativo -->
  <g opacity="0.08">
    <rect x="50" y="250" width="450" height="6" rx="3" fill="#06b6d4"/>
    <rect x="50" y="300" width="380" height="6" rx="3" fill="#3b82f6"/>
    <rect x="50" y="350" width="420" height="6" rx="3" fill="#38bdf8"/>
  </g>
  
  <!-- Logo/Marca superior izquierda -->
  <g transform="translate(80, 80)">
    <!-- Círculo del logo -->
    <circle r="28" fill="none" stroke="url(#titleGlow)" stroke-width="3" filter="url(#glow)"/>
    <circle r="22" fill="url(#accentGlow)" opacity="0.3"/>
    
    <!-- Texto SG -->
    <text x="40" y="12" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#ffffff" letter-spacing="1">
      SERVICIO TÉCNICO
    </text>
  </g>
  
  <!-- Botón "SEGUIMIENTO DE SERVICIO" superior -->
  <g transform="translate(680, 80)">
    <rect width="280" height="50" rx="25" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>
    <text x="140" y="33" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="1">
      SEGUIMIENTO DE SERVICIO
    </text>
  </g>
  
  <!-- Tarjeta de Login Principal con glassmorphism -->
  <g transform="translate(1220, 240)">
    <!-- Sombra de la tarjeta -->
    <rect x="8" y="12" width="580" height="720" rx="24" fill="#000000" opacity="0.4" filter="url(#shadowSoft)"/>
    
    <!-- Fondo glassmorphism -->
    <rect width="580" height="720" rx="24" fill="url(#glassCard)" opacity="0.9"/>
    
    <!-- Borde con gradiente -->
    <rect width="580" height="720" rx="24" fill="none" stroke="url(#titleGlow)" stroke-width="2" opacity="0.4"/>
    
    <!-- Highlight superior glassmorphism -->
    <rect x="30" y="1" width="520" height="1.5" fill="#ffffff" opacity="0.5" rx="0.75"/>
    
    <!-- Contenido de la tarjeta -->
    <g transform="translate(60, 80)">
      <!-- Título principal con gradiente -->
      <text x="230" y="0" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="url(#titleGlow)" text-anchor="middle" filter="url(#glow)">
        Iniciar Sesión
      </text>
      
      <!-- Subtítulo -->
      <text x="230" y="35" font-family="Inter, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" opacity="0.9">
        Accede a tu cuenta del sistema
      </text>
      
      <!-- Línea decorativa bajo el título -->
      <rect x="160" y="55" width="140" height="3" rx="1.5" fill="url(#buttonPrimary)" opacity="0.6"/>
      
      <!-- Input 1: Nombre de usuario -->
      <g transform="translate(0, 120)">
        <!-- Contenedor del input -->
        <rect width="460" height="65" rx="14" fill="#1e293b" opacity="0.7"/>
        <rect width="460" height="65" rx="14" fill="none" stroke="#334155" stroke-width="2"/>
        
        <!-- Icono de usuario -->
        <g transform="translate(25, 32.5)">
          <circle r="11" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
          <path d="M -7 17 Q 0 12 7 17" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        
        <!-- Texto placeholder -->
        <text x="60" y="42" font-family="Inter, sans-serif" font-size="17" fill="#64748b" font-weight="500">
          Nombre de usuario
        </text>
      </g>
      
      <!-- Input 2: Contraseña -->
      <g transform="translate(0, 210)">
        <!-- Contenedor del input -->
        <rect width="460" height="65" rx="14" fill="#1e293b" opacity="0.7"/>
        <rect width="460" height="65" rx="14" fill="none" stroke="#334155" stroke-width="2"/>
        
        <!-- Icono de candado -->
        <g transform="translate(25, 32.5)">
          <rect x="-7" y="2" width="14" height="12" rx="2" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
          <path d="M -5 2 L -5 -4 A 5 5 0 0 1 5 -4 L 5 2" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
          <circle cy="8" r="2" fill="#06b6d4"/>
        </g>
        
        <!-- Texto placeholder -->
        <text x="60" y="42" font-family="Inter, sans-serif" font-size="17" fill="#64748b" font-weight="500">
          Contraseña
        </text>
        
        <!-- Icono de ojo -->
        <g transform="translate(420, 32.5)">
          <ellipse rx="11" ry="7" fill="none" stroke="#64748b" stroke-width="2"/>
          <circle r="3.5" fill="#64748b"/>
        </g>
      </g>
      
      <!-- Link: ¿Olvidaste tu contraseña? -->
      <text x="460" y="310" font-family="Inter, sans-serif" font-size="14" fill="#38bdf8" text-anchor="end" font-weight="600">
        ¿Olvidaste tu contraseña?
      </text>
      
      <!-- Botón ENTRAR con gradiente premium -->
      <g transform="translate(0, 340)">
        <!-- Glow del botón -->
        <rect x="-4" y="-4" width="468" height="73" rx="16" fill="url(#buttonPrimary)" opacity="0.5" filter="url(#glow)"/>
        
        <!-- Botón principal -->
        <rect width="460" height="65" rx="14" fill="url(#buttonPrimary)"/>
        
        <!-- Highlight superior -->
        <rect x="25" y="8" width="410" height="2" fill="#ffffff" opacity="0.6" rx="1"/>
        
        <!-- Texto del botón -->
        <text x="230" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">
          ENTRAR
        </text>
      </g>
      
      <!-- Separador -->
      <g transform="translate(0, 450)">
        <line x1="0" y1="0" x2="200" y2="0" stroke="#475569" stroke-width="1.5"/>
        <text x="230" y="6" font-family="Inter, sans-serif" font-size="14" fill="#64748b" text-anchor="middle" font-weight="600">O</text>
        <line x1="260" y1="0" x2="460" y2="0" stroke="#475569" stroke-width="1.5"/>
      </g>
      
      <!-- Texto de registro -->
      <g transform="translate(0, 495)">
        <text x="230" y="0" font-family="Inter, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">
          ¿No tienes una cuenta? 
        </text>
        <text x="230" y="28" font-family="Inter, sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle" font-weight="700">
          Regístrate
        </text>
      </g>
    </g>
  </g>
  
  <!-- Panel izquierdo: Información/Ilustración -->
  <g transform="translate(150, 350)">
    <!-- Título decorativo -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff" opacity="0.95">
      Bienvenido
    </text>
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="url(#titleGlow)" filter="url(#glow)">
      de vuelta
    </text>
    
    <!-- Subtítulo -->
    <text x="0" y="120" font-family="Inter, sans-serif" font-size="20" fill="#94a3b8" opacity="0.8">
      Gestiona tus servicios técnicos
    </text>
    <text x="0" y="150" font-family="Inter, sans-serif" font-size="20" fill="#94a3b8" opacity="0.8">
      de manera rápida y eficiente
    </text>
    
    <!-- Elementos decorativos -->
    <g transform="translate(0, 220)">
      <!-- Característica 1 -->
      <g>
        <circle cx="15" cy="0" r="8" fill="url(#buttonPrimary)" opacity="0.8"/>
        <text x="40" y="6" font-family="Inter, sans-serif" font-size="17" fill="#cbd5e1" font-weight="600">
          Seguimiento en tiempo real
        </text>
      </g>
      
      <!-- Característica 2 -->
      <g transform="translate(0, 45)">
        <circle cx="15" cy="0" r="8" fill="url(#buttonPrimary)" opacity="0.8"/>
        <text x="40" y="6" font-family="Inter, sans-serif" font-size="17" fill="#cbd5e1" font-weight="600">
          Gestión de inventario
        </text>
      </g>
      
      <!-- Característica 3 -->
      <g transform="translate(0, 90)">
        <circle cx="15" cy="0" r="8" fill="url(#buttonPrimary)" opacity="0.8"/>
        <text x="40" y="6" font-family="Inter, sans-serif" font-size="17" fill="#cbd5e1" font-weight="600">
          Estadísticas detalladas
        </text>
      </g>
    </g>
    
    <!-- Ilustración decorativa simple -->
    <g transform="translate(50, 450)">
      <rect x="0" y="0" width="180" height="120" rx="12" fill="url(#glassCard)" opacity="0.3" stroke="#06b6d4" stroke-width="2"/>
      <rect x="15" y="15" width="150" height="8" rx="4" fill="#06b6d4" opacity="0.6"/>
      <rect x="15" y="35" width="120" height="8" rx="4" fill="#3b82f6" opacity="0.5"/>
      <rect x="15" y="55" width="140" height="8" rx="4" fill="#38bdf8" opacity="0.4"/>
      
      <circle cx="30" cy="90" r="12" fill="url(#buttonPrimary)" opacity="0.7"/>
      <circle cx="90" cy="90" r="12" fill="url(#buttonPrimary)" opacity="0.5"/>
      <circle cx="150" cy="90" r="12" fill="url(#buttonPrimary)" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Partículas flotantes animadas -->
  <circle cx="400" cy="250" r="4" fill="#06b6d4" opacity="0.4">
    <animate attributeName="cy" from="250" to="180" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1100" cy="850" r="3" fill="#3b82f6" opacity="0.35">
    <animate attributeName="cy" from="850" to="780" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.35" to="0" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="650" cy="600" r="3.5" fill="#38bdf8" opacity="0.3">
    <animate attributeName="cy" from="600" to="530" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1550" cy="400" r="2.5" fill="#60a5fa" opacity="0.25">
    <animate attributeName="cy" from="400" to="340" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.25" to="0" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Footer sutil -->
  <text x="960" y="1050" font-family="Inter, sans-serif" font-size="13" fill="#475569" text-anchor="middle" opacity="0.6">
    Sistema SG © 2025 - Todos los derechos reservados
  </text>
</svg>
