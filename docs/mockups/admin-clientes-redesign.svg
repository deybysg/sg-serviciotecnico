<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="gradPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .header { fill: #0f172a; }
      .sidebar { fill: #0b1220; }
      .heading { font: 700 32px 'Inter', Arial, sans-serif; fill: #0f172a; }
      .subtle { font: 400 14px 'Inter', Arial, sans-serif; fill: #64748b; }
      .label { font: 600 14px 'Inter', Arial, sans-serif; fill: #334155; }
      .text { font: 500 14px 'Inter', Arial, sans-serif; fill: #0f172a; }
      .logo { font: 700 22px 'Inter', Arial, sans-serif; letter-spacing: 1px; }
      .btnText { font: 700 14px 'Inter', Arial, sans-serif; }
      .chip { font: 600 12px 'Inter', Arial, sans-serif; fill: #2563eb; }
      .muted { fill: #e2e8f0; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <!-- Header -->
  <rect class="header" x="0" y="0" width="1440" height="72"/>
  <circle cx="48" cy="36" r="18" fill="#1e293b"/>
  <text x="76" y="43" class="logo" fill="#f8fafc">SUPERADMIN</text>
  <!-- Logout button -->
  <rect x="1260" y="18" rx="10" ry="10" width="120" height="36" fill="#f472b6"/>
  <text x="1286" y="41" class="btnText" fill="#ffffff">Logout</text>

  <!-- Sidebar -->
  <rect class="sidebar" x="0" y="72" width="64" height="828"/>
  <!-- Sidebar icons (placeholders) -->
  <g fill="#94a3b8">
    <rect x="16" y="116" rx="8" width="32" height="32"/>
    <rect x="16" y="176" rx="8" width="32" height="32"/>
    <rect x="16" y="236" rx="8" width="32" height="32"/>
    <rect x="16" y="296" rx="8" width="32" height="32"/>
    <rect x="16" y="356" rx="8" width="32" height="32"/>
    <rect x="16" y="416" rx="8" width="32" height="32"/>
  </g>

  <!-- Page heading -->
  <text x="96" y="140" class="heading">Gestión de Clientes</text>
  <text x="96" y="166" class="subtle">Crea y administra clientes. Los campos marcados son obligatorios.</text>

  <!-- Card -->
  <g filter="url(#softShadow)">
    <rect x="96" y="196" width="1248" height="420" rx="16" fill="#ffffff"/>
  </g>

  <!-- Card header line -->
  <rect x="96" y="196" width="1248" height="6" fill="url(#gradPrimary)"/>

  <!-- Form grid (2 columnas) -->
  <!-- Columna izquierda -->
  <text x="144" y="258" class="label">Apellido y Nombre</text>
  <rect x="140" y="268" width="520" height="48" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="160" y="297" class="subtle">Ej.: Juan Pérez</text>

  <text x="144" y="338" class="label">Correo</text>
  <rect x="140" y="348" width="520" height="48" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="160" y="377" class="subtle">nombre@empresa.com</text>

  <!-- Columna derecha -->
  <text x="744" y="258" class="label">Celular</text>
  <rect x="740" y="268" width="520" height="48" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="760" y="297" class="subtle">+54 9 11 1234-5678</text>

  <text x="744" y="338" class="label">Dirección</text>
  <rect x="740" y="348" width="520" height="48" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="760" y="377" class="subtle">Calle 123, Ciudad</text>

  <!-- Divider -->
  <rect x="116" y="408" width="1208" height="1" class="muted"/>

  <!-- Footer actions -->
  <rect x="116" y="430" rx="24" width="220" height="36" fill="#e2e8f0"/>
  <text x="132" y="452" class="subtle">Autosave activado</text>

  <!-- Primary button -->
  <g filter="url(#softShadow)">
    <rect x="1008" y="444" rx="12" width="252" height="56" fill="url(#gradPrimary)"/>
  </g>
  <text x="1036" y="478" class="btnText" fill="#ffffff">Agregar Cliente</text>

  <!-- Secondary button -->
  <rect x="742" y="444" rx="12" width="252" height="56" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="772" y="478" class="btnText" fill="#2563eb">Ver Lista de Clientes</text>

  <!-- Empty state preview for tabla (opcional) -->
  <g opacity="0.85">
    <rect x="96" y="644" width="1248" height="160" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="120" y="680" class="label">Lista de clientes</text>
    <text x="120" y="706" class="subtle">Aún no hay registros. Agrega un cliente para comenzar.</text>
    <rect x="1188" y="680" rx="8" width="132" height="36" fill="#f1f5f9"/>
    <text x="1210" y="703" class="subtle" style="fill:#2563eb">Importar CSV</text>
  </g>

  <!-- Notas de guía (al costado) -->
  <text x="108" y="840" class="subtle">Notas de UI: tipografía Inter, colores neutrales + azul corporativo, inputs con 10px de radio, micro-sombras y botones con jerarquía clara.</text>
</svg>
