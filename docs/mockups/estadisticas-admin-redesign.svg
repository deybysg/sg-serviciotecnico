<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="gradPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gradAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .header { fill: #0f172a; }
      .heading { font: 800 34px 'Inter', Arial, sans-serif; fill: #0f172a; }
      .subtle { font: 400 14px 'Inter', Arial, sans-serif; fill: #64748b; }
      .label { font: 600 14px 'Inter', Arial, sans-serif; fill: #334155; }
      .text { font: 600 16px 'Inter', Arial, sans-serif; fill: #0f172a; }
      .btnText { font: 700 14px 'Inter', Arial, sans-serif; }
      .kpiValue { font: 800 26px 'Inter', Arial, sans-serif; fill: #0f172a; }
      .kpiLabel { font: 500 13px 'Inter', Arial, sans-serif; fill: #64748b; }
      .chip { font: 700 12px 'Inter', Arial, sans-serif; fill: #2563eb; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1600" height="1100"/>

  <!-- Header -->
  <rect class="header" x="0" y="0" width="1600" height="80"/>
  <circle cx="56" cy="40" r="20" fill="#1e293b"/>
  <text x="88" y="48" style="font:700 22px 'Inter', Arial, sans-serif; fill:#e2e8f0">SUPERADMIN</text>
  <rect x="1410" y="22" rx="10" ry="10" width="140" height="36" fill="#f472b6"/>
  <text x="1448" y="46" class="btnText" fill="#ffffff">Logout</text>

  <!-- Page title -->
  <text x="96" y="140" class="heading">📊 Panel de Estadísticas</text>
  <text x="96" y="166" class="subtle">Resumen de rendimiento del taller y ventas de productos.</text>

  <!-- Tabs -->
  <g filter="url(#softShadow)">
    <rect x="96" y="188" width="560" height="54" rx="12" fill="#ffffff"/>
  </g>
  <rect x="100" y="194" width="270" height="42" rx="10" fill="url(#gradPrimary)"/>
  <text x="150" y="220" class="btnText" fill="#ffffff">Estadísticas de Servicios</text>
  <text x="400" y="220" class="btnText" fill="#2563eb">Estadísticas de Ventas</text>

  <!-- Filters card -->
  <g filter="url(#softShadow)">
    <rect x="676" y="188" width="828" height="54" rx="12" fill="#ffffff"/>
  </g>
  <text x="700" y="220" class="label">Año</text>
  <rect x="740" y="198" width="160" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="800" y="221" class="subtle">2024</text>

  <text x="940" y="220" class="label">Mes</text>
  <rect x="980" y="198" width="200" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="1048" y="221" class="subtle">Todos</text>

  <rect x="1210" y="198" width="280" height="36" rx="8" fill="url(#gradAccent)"/>
  <text x="1228" y="221" class="btnText" fill="#ffffff">Aplicar filtros</text>

  <!-- KPI Cards -->
  <g filter="url(#softShadow)">
    <rect x="96" y="262" width="360" height="120" rx="14" fill="#ffffff"/>
    <rect x="476" y="262" width="360" height="120" rx="14" fill="#ffffff"/>
    <rect x="856" y="262" width="360" height="120" rx="14" fill="#ffffff"/>
    <rect x="1236" y="262" width="260" height="120" rx="14" fill="#ffffff"/>
  </g>
  <text x="124" y="306" class="kpiValue">$ 2.450.000</text>
  <text x="124" y="334" class="kpiLabel">Ingresos Totales (Servicios)</text>
  <circle cx="420" cy="310" r="20" fill="url(#gradPrimary)"/>

  <text x="504" y="306" class="kpiValue">18</text>
  <text x="504" y="334" class="kpiLabel">Equipos en Taller</text>
  <circle cx="800" cy="310" r="20" fill="#06b6d4"/>

  <text x="884" y="306" class="kpiValue">72</text>
  <text x="884" y="334" class="kpiLabel">Servicios Entregados</text>
  <circle cx="1180" cy="310" r="20" fill="#10b981"/>

  <text x="1264" y="306" class="kpiValue">3.6 días</text>
  <text x="1264" y="334" class="kpiLabel">Promedio de Días</text>

  <!-- Charts Row -->
  <!-- Bar Chart Card -->
  <g filter="url(#softShadow)">
    <rect x="96" y="404" width="960" height="380" rx="16" fill="#ffffff"/>
  </g>
  <text x="124" y="444" class="text">Ingresos por Mes (Servicios)</text>
  <text x="124" y="468" class="subtle">Ganancias de servicios entregados por periodo</text>

  <!-- Chart grid and bars -->
  <rect x="124" y="488" width="912" height="240" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- bars (12) -->
  <g>
    <rect x="144" y="640" width="52" height="88" rx="8" fill="url(#gradPrimary)"/>
    <rect x="206" y="620" width="52" height="108" rx="8" fill="url(#gradPrimary)"/>
    <rect x="268" y="676" width="52" height="52" rx="8" fill="url(#gradPrimary)"/>
    <rect x="330" y="600" width="52" height="128" rx="8" fill="url(#gradPrimary)"/>
    <rect x="392" y="560" width="52" height="168" rx="8" fill="url(#gradPrimary)"/>
    <rect x="454" y="592" width="52" height="136" rx="8" fill="url(#gradPrimary)"/>
    <rect x="516" y="616" width="52" height="112" rx="8" fill="url(#gradPrimary)"/>
    <rect x="578" y="650" width="52" height="78" rx="8" fill="url(#gradPrimary)"/>
    <rect x="640" y="624" width="52" height="104" rx="8" fill="url(#gradPrimary)"/>
    <rect x="702" y="670" width="52" height="58" rx="8" fill="url(#gradPrimary)"/>
    <rect x="764" y="612" width="52" height="116" rx="8" fill="url(#gradPrimary)"/>
    <rect x="826" y="568" width="52" height="160" rx="8" fill="url(#gradPrimary)"/>
  </g>
  <!-- x labels -->
  <text x="150" y="744" class="subtle">ENE</text>
  <text x="212" y="744" class="subtle">FEB</text>
  <text x="274" y="744" class="subtle">MAR</text>
  <text x="336" y="744" class="subtle">ABR</text>
  <text x="398" y="744" class="subtle">MAY</text>
  <text x="460" y="744" class="subtle">JUN</text>
  <text x="522" y="744" class="subtle">JUL</text>
  <text x="584" y="744" class="subtle">AGO</text>
  <text x="646" y="744" class="subtle">SEP</text>
  <text x="708" y="744" class="subtle">OCT</text>
  <text x="770" y="744" class="subtle">NOV</text>
  <text x="832" y="744" class="subtle">DIC</text>

  <!-- Pie Chart Card -->
  <g filter="url(#softShadow)">
    <rect x="1084" y="404" width="372" height="380" rx="16" fill="#ffffff"/>
  </g>
  <text x="1108" y="444" class="text">Distribución por Tipo de Servicio</text>
  <text x="1108" y="468" class="subtle">Proporción de equipos por categoría</text>

  <!-- Pie -->
  <g>
    <circle cx="1270" cy="590" r="92" fill="#e2e8f0"/>
    <path d="M1270,590 L1270,498 A92,92 0 0,1 1350,646 Z" fill="#4CAF50"/>
    <path d="M1270,590 L1350,646 A92,92 0 0,1 1228,670 Z" fill="#2196F3"/>
    <path d="M1270,590 L1228,670 A92,92 0 0,1 1188,560 Z" fill="#FF9800"/>
    <path d="M1270,590 L1188,560 A92,92 0 0,1 1270,498 Z" fill="#9C27B0"/>
  </g>

  <!-- Legend -->
  <g>
    <rect x="1188" y="694" width="240" height="70" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="1200" y="708" width="14" height="14" rx="3" fill="#4CAF50"/>
    <text x="1220" y="719" class="subtle">Celulares 38%</text>
    <rect x="1200" y="732" width="14" height="14" rx="3" fill="#2196F3"/>
    <text x="1220" y="743" class="subtle">Computadora 27%</text>
    <rect x="1328" y="708" width="14" height="14" rx="3" fill="#FF9800"/>
    <text x="1348" y="719" class="subtle">Parlantes 19%</text>
    <rect x="1328" y="732" width="14" height="14" rx="3" fill="#9C27B0"/>
    <text x="1348" y="743" class="subtle">Otros 16%</text>
  </g>

  <!-- Detail table preview -->
  <g filter="url(#softShadow)">
    <rect x="96" y="816" width="1360" height="212" rx="14" fill="#ffffff"/>
  </g>
  <text x="124" y="852" class="text">Detalle del mes seleccionado</text>
  <text x="124" y="876" class="subtle">Haz click en una barra para ver el detalle del mes.</text>

  <!-- table head -->
  <rect x="124" y="896" width="1312" height="36" rx="8" fill="#f1f5f9"/>
  <text x="140" y="919" class="label">ID/Fecha</text>
  <text x="370" y="919" class="label">Tipo</text>
  <text x="540" y="919" class="label">Marca</text>
  <text x="1230" y="919" class="label">Precio</text>

  <!-- table rows -->
  <g>
    <rect x="124" y="938" width="1312" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="140" y="964" class="subtle">#A12F • 12/04</text>
    <text x="370" y="964" class="subtle">Celulares</text>
    <text x="540" y="964" class="subtle">Samsung</text>
    <text x="1230" y="964" class="subtle">$ 52.000</text>

    <rect x="124" y="982" width="1312" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="140" y="1008" class="subtle">#B09C • 24/04</text>
    <text x="370" y="1008" class="subtle">Computadora</text>
    <text x="540" y="1008" class="subtle">Lenovo</text>
    <text x="1230" y="1008" class="subtle">$ 84.500</text>
  </g>

</svg>
